<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
  <title>假装来电</title>
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="themes.css">
</head>
<body>

  <!-- ========== 设置页 ========== -->
  <div id="page-settings" class="page active">
    <div class="settings-wrapper">
      <h1 class="settings-title">假装来电</h1>

      <div class="form-group">
        <label class="form-label">来电人姓名</label>
        <input type="text" id="input-name" class="form-input" value="妈妈" placeholder="请输入来电人姓名">
      </div>

      <div class="form-group">
        <label class="form-label">来电号码</label>
        <input type="text" id="input-number" class="form-input" value="13800138000" placeholder="请输入来电号码">
      </div>

      <div class="form-group">
        <label class="form-label">来电头像</label>
        <div id="avatar-area" class="avatar-area">
          <img id="avatar-preview" class="avatar-preview" src="" alt="头像">
          <span id="avatar-placeholder" class="avatar-placeholder">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="14" r="8" stroke="#8E8E93" stroke-width="2"/>
              <path d="M6 36c0-8 6-14 14-14s14 6 14 14" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="avatar-hint">点击更换</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">来电主题</label>
        <div class="radio-group" id="theme-group">
          <label class="radio-item">
            <input type="radio" name="theme" value="ios" checked>
            <span class="radio-label">系统默认</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="theme" value="huawei">
            <span class="radio-label">华为风格</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="theme" value="xiaomi">
            <span class="radio-label">小米风格</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="theme" value="wechat">
            <span class="radio-label">微信语音</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">延迟时间</label>
        <div class="radio-group" id="delay-group">
          <label class="radio-item">
            <input type="radio" name="delay" value="immediate" checked>
            <span class="radio-label">立即</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="delay" value="5">
            <span class="radio-label">5 秒后</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="delay" value="30">
            <span class="radio-label">30 秒后</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="delay" value="custom">
            <span class="radio-label">自定义</span>
            <input type="number" id="custom-delay" class="custom-delay-input" value="10" min="1" max="999" disabled>
            <span class="radio-label">秒</span>
          </label>
        </div>
        <p class="form-hint">提示：设置较长延迟时间时，请先在手机设置中将自动锁屏时间调至比延迟时间更长，避免浏览器被休眠</p>
      </div>

      <div class="form-group">
        <label class="form-label">铃声</label>
        <select id="ringtone-select" class="form-select">
          <option value="iphone">iPhone 默认</option>
          <option value="huawei">华为默认</option>
          <option value="xiaomi">小米默认</option>
          <option value="wechat">微信语音铃声</option>
          <option value="silent">静音</option>
        </select>
      </div>

      <button id="btn-start" class="btn-primary">开始模拟</button>
      <p class="settings-hint">建议在浏览器中开启深色/夜间模式，效果更逼真</p>

      <div class="beian-bar">
        <div class="beian-pc">
          <span class="beian-disclaimer">本站内容仅供学习和交流，非商业用途</span>
          <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="beian-icp">浙ICP备2025187466号</a>
          <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener noreferrer" class="beian-gongan">
            <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" onerror="this.style.display='none'">
            浙公网安备33030402001483号
          </a>
        </div>
        <div class="beian-mobile">
          <span class="beian-disclaimer">本站内容仅供学习和交流，非商业用途</span>
          <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="beian-icp">浙ICP备2025187466号</a>
          <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33030402001483" target="_blank" rel="noopener noreferrer" class="beian-gongan">
            <img src="https://www.937788.xyz/gonganbeian.png" alt="公安备案" onerror="this.style.display='none'">
            浙公网安备33030402001483号
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 等待页 ========== -->
  <div id="page-waiting" class="page dark-bg">
    <div class="waiting-wrapper">
      <div id="countdown-display" class="countdown-display">00:00</div>
      <p class="waiting-hint">请保持此页面不要关闭</p>
      <p class="waiting-subhint">倒计时结束后将自动来电</p>
      <button id="btn-cancel-wait" class="btn-text">取消</button>
    </div>
    <span id="cancel-float" class="cancel-float">取消</span>
  </div>

  <!-- ========== 来电页 ========== -->
  <div id="page-incoming" class="page dark-bg incoming-page">
    <!-- 微信标题栏 -->
    <div id="wechat-bar" class="wechat-bar" style="display:none">
      <span class="wechat-bar-title">微信</span>
    </div>

    <div class="incoming-content">
      <!-- 头像 -->
      <div id="incoming-avatar-container" class="incoming-avatar-container">
        <img id="incoming-avatar" class="incoming-avatar" src="" alt="">
      </div>

      <!-- 姓名 -->
      <div id="incoming-name" class="incoming-name"></div>

      <!-- 号码 / 副标题 -->
      <div id="incoming-subtitle" class="incoming-subtitle"></div>

      <!-- 微信语音提示 -->
      <div id="wechat-call-hint" class="wechat-call-hint" style="display:none">邀请你语音通话</div>

      <!-- 操作按钮 -->
      <div class="incoming-actions">
        <div class="incoming-action-item" id="btn-decline-container">
          <button id="btn-decline" class="btn-decline">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <path d="M6.5 6.5L17.5 17.5M17.5 6.5L6.5 17.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="action-label" id="decline-label">拒绝</span>
        </div>
        <div class="incoming-action-item" id="btn-accept-container">
          <button id="btn-accept" class="btn-accept">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <path d="M3 10l3 3 5-5M11 15l3 3 7-7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="action-label" id="accept-label">接听</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 通话页 ========== -->
  <div id="page-call" class="page dark-bg">
    <div class="call-wrapper">
      <div class="call-header">
        <img id="call-avatar" class="call-avatar" src="" alt="">
        <div id="call-name" class="call-name"></div>
        <div id="call-timer" class="call-timer">00:00</div>
      </div>

      <div class="wave-container">
        <canvas id="wave-canvas" class="wave-canvas"></canvas>
      </div>

      <div class="call-controls">
        <div class="call-controls-row">
          <div class="call-control-item" id="btn-mute">
            <button class="btn-call-ctrl">
              <!-- 未静音：麦克风图标 -->
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" id="mute-icon-on">
                <rect x="9" y="1" width="6" height="11" rx="3" stroke="white" stroke-width="2"/>
                <path d="M5 11a7 7 0 0014 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="8" y1="23" x2="16" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <!-- 已静音：麦克风 + 斜线 -->
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" id="mute-icon-off" style="display:none">
                <rect x="9" y="1" width="6" height="11" rx="3" stroke="white" stroke-width="2"/>
                <path d="M5 11a7 7 0 0014 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="8" y1="23" x2="16" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke="#FF453A" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
            </button>
            <span class="ctrl-label">静音</span>
          </div>
          <div class="call-control-item" id="btn-speaker">
            <button class="btn-call-ctrl">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M15.5 8.5a5 5 0 010 7" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <path d="M18.5 5.5a9 9 0 010 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <span class="ctrl-label">免提</span>
          </div>
          <div class="call-control-item" id="btn-keypad">
            <button class="btn-call-ctrl">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <circle cx="6" cy="6" r="1.5" fill="white"/>
                <circle cx="12" cy="6" r="1.5" fill="white"/>
                <circle cx="18" cy="6" r="1.5" fill="white"/>
                <circle cx="6" cy="12" r="1.5" fill="white"/>
                <circle cx="12" cy="12" r="1.5" fill="white"/>
                <circle cx="18" cy="12" r="1.5" fill="white"/>
                <circle cx="6" cy="18" r="1.5" fill="white"/>
                <circle cx="12" cy="18" r="1.5" fill="white"/>
                <circle cx="18" cy="18" r="1.5" fill="white"/>
              </svg>
            </button>
            <span class="ctrl-label">拨号键盘</span>
          </div>
        </div>
        <button id="btn-hangup" class="btn-hangup">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M6.5 6.5L17.5 17.5M17.5 6.5L6.5 17.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 隐藏的拨号键盘弹窗 -->
  <div id="keypad-overlay" class="keypad-overlay" style="display:none">
    <div class="keypad-dial">
      <div class="keypad-display" id="keypad-display"></div>
      <div class="keypad-grid">
        <button class="keypad-key" data-key="1">1</button>
        <button class="keypad-key" data-key="2">2</button>
        <button class="keypad-key" data-key="3">3</button>
        <button class="keypad-key" data-key="4">4</button>
        <button class="keypad-key" data-key="5">5</button>
        <button class="keypad-key" data-key="6">6</button>
        <button class="keypad-key" data-key="7">7</button>
        <button class="keypad-key" data-key="8">8</button>
        <button class="keypad-key" data-key="9">9</button>
        <button class="keypad-key" data-key="*">*</button>
        <button class="keypad-key" data-key="0">0</button>
        <button class="keypad-key" data-key="#">#</button>
      </div>
      <button id="btn-keypad-close" class="btn-keypad-close">关闭</button>
    </div>
  </div>

  <input type="file" id="avatar-input" accept="image/*" style="display:none">

  <script src="audio.js"></script>
  <script src="countdown.js"></script>
  <script src="incoming.js"></script>
  <script src="main.js"></script>
</body>
</html>
